baseURL = "https://duxingkei33.github.io"
languageCode = "zh-cn"
title = "duxingkei 的博客"
theme = "PaperMod"
defaultContentLanguage = "zh"
enableEmoji = true
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[permalinks]
  posts = "/:year/:month/:day/:slug/"

[params]
  description = "技术笔记与项目管理"
  env = "production"
  author = "duxingkei"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "duxingkei 的博客"
    Content = "技术笔记与项目管理 | ESPHome / Home Assistant / 嵌入式开发"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/duxingkei33"
  [[params.socialIcons]]
    name = "rss"
    url = "https://duxingkei33.github.io/index.xml"

  [params.assets]
    disableHLJS = false

  [params.giscus]
    repo = "duxingkei33/duxingkei33.github.io"
    repoId = "R_kgDOTHcTiA"
    category = "General"
    categoryId = "DIC_kwDOTHcTiM4DAR_i"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "top"
    theme = "preferred_color_scheme"
    lang = "zh-CN"
    loading = "lazy"

[languages]
  [languages.zh]
    languageCode = "zh"
    languageName = "中文"
    contentDir = "content"
    title = "duxingkei 的博客"

    [languages.zh.menu]
      [[languages.zh.menu.main]]
        identifier = "home"
        name = "首页"
        url = "/"
        weight = 1
      [[languages.zh.menu.main]]
        identifier = "posts"
        name = "归档"
        url = "/posts/"
        weight = 2
      [[languages.zh.menu.main]]
        identifier = "tags"
        name = "标签"
        url = "/tags/"
        weight = 3
      [[languages.zh.menu.main]]
        identifier = "search"
        name = "搜索"
        url = "/search/"
        weight = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
